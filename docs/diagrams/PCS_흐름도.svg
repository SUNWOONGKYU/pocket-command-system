<svg xmlns="http://www.w3.org/2000/svg" width="980" height="700" viewBox="0 0 980 700" font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="700" fill="#f7f9fc"/>
  <text x="40" y="42" fill="#0f172a" font-size="24" font-weight="800">Pocket Command System — 흐름도</text>
  <text x="40" y="66" fill="#475569" font-size="12">작업 한 건의 여정 (왼쪽: 명령 흐름) + 감사 루프 (오른쪽: 자동 견제)</text>

  <!-- 메인 흐름 (왼쪽) -->
  <g font-size="13">
    <rect x="60" y="100" width="380" height="62" rx="9" fill="#0f172a"/>
    <text x="80" y="128" fill="#fff" font-weight="800">① 📱 폰 — 콕핏에서 명령</text>
    <text x="80" y="150" fill="#cbd5e1" font-size="11.5">프로젝트 카드 → 워커 탭 선택 → 명령 입력</text>

    <rect x="60" y="190" width="380" height="56" rx="9" fill="#fff" stroke="#00a3c4" stroke-width="1.5"/>
    <text x="80" y="216" fill="#0f172a" font-weight="700">② 📡 /api/command 수신</text>
    <text x="80" y="235" fill="#475569" font-size="11.5">멀티라인 긴 글도 전체 전달(stdin 방식)</text>

    <rect x="60" y="274" width="380" height="62" rx="9" fill="#fff" stroke="#00b36e" stroke-width="1.5"/>
    <text x="80" y="300" fill="#0f172a" font-weight="700">③ 👤 담당 명시 — 사람이 직접 선택</text>
    <text x="80" y="320" fill="#475569" font-size="11.5">AI 추론 배정 없음(오케스트레이터 폐지) · 감사관 제외</text>

    <rect x="60" y="364" width="380" height="56" rx="9" fill="#0d9488"/>
    <text x="80" y="390" fill="#fff" font-weight="700">④ 🗄 tasks 큐 적재 (Supabase)</text>
    <text x="80" y="409" fill="#e0f2f1" font-size="11.5">status=queued, 담당 워커 지정</text>

    <rect x="60" y="448" width="380" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="474" fill="#0f172a" font-weight="700">⑤ 🪖 워커 픽업 → 실행</text>
    <text x="80" y="494" fill="#475569" font-size="11.5">claude CLI(구독)로 작업 · 큰 작업이면 백호/DW 폭발</text>

    <rect x="60" y="538" width="380" height="62" rx="9" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="80" y="564" fill="#0f172a" font-weight="700">⑥ ✅ 결과 보고</text>
    <text x="80" y="584" fill="#475569" font-size="11.5">텔레그램 회신(+콕핏 딥링크 버튼) + 대시보드 실시간 갱신</text>

    <line x1="250" y1="162" x2="250" y2="189" stroke="#475569" stroke-width="1.8" marker-end="url(#a2)"/>
    <line x1="250" y1="246" x2="250" y2="273" stroke="#475569" stroke-width="1.8" marker-end="url(#a2)"/>
    <line x1="250" y1="336" x2="250" y2="363" stroke="#475569" stroke-width="1.8" marker-end="url(#a2)"/>
    <line x1="250" y1="420" x2="250" y2="447" stroke="#475569" stroke-width="1.8" marker-end="url(#a2)"/>
    <line x1="250" y1="510" x2="250" y2="537" stroke="#475569" stroke-width="1.8" marker-end="url(#a2)"/>
  </g>

  <!-- 감사 루프 (오른쪽) -->
  <g font-size="12.5">
    <rect x="540" y="190" width="380" height="410" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="560" y="222" fill="#b45309" font-size="15" font-weight="800">🔁 감사 ↔ 대응 루프 (자동)</text>
    <text x="560" y="244" fill="#92400e" font-size="11.5">사람 개입 없이: 커밋 → 감사 → 대응</text>

    <rect x="560" y="262" width="340" height="52" rx="9" fill="#fff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="578" y="286" fill="#0f172a" font-weight="700">A. 워커가 git commit</text>
    <text x="578" y="304" fill="#475569" font-size="11">담당 프로젝트 저장소에 변경 반영</text>

    <rect x="560" y="334" width="340" height="52" rx="9" fill="#fff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="578" y="358" fill="#0f172a" font-weight="700">B. post-commit 훅 → 감사 작업 적재</text>
    <text x="578" y="376" fill="#475569" font-size="11">커밋 해시·diff 캡처 → tasks 큐(감사관 담당)</text>

    <rect x="560" y="406" width="340" height="58" rx="9" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.3"/>
    <text x="578" y="430" fill="#0f172a" font-weight="700">C. 🔍 감사관 감사 (읽기 전용)</text>
    <text x="578" y="448" fill="#475569" font-size="11">프로젝트별 기준 검토 → 판정 → _audit/감사이력.md 기록</text>

    <rect x="560" y="484" width="340" height="58" rx="9" fill="#fff" stroke="#16a34a" stroke-width="1.3"/>
    <text x="578" y="508" fill="#0f172a" font-weight="700">D. 워커 자동 대응</text>
    <text x="578" y="526" fill="#475569" font-size="11">감사 의견에 수용/반론 → _audit/대응이력.md</text>

    <text x="560" y="566" fill="#92400e" font-size="11">_audit/ 는 .gitignore (커밋 안 됨) → 무한루프 차단</text>
    <text x="560" y="586" fill="#92400e" font-size="11">감사관은 자동 전용 — 사람이 배정하지 않음</text>

    <line x1="730" y1="314" x2="730" y2="333" stroke="#b45309" stroke-width="1.8" marker-end="url(#a2)"/>
    <line x1="730" y1="386" x2="730" y2="405" stroke="#b45309" stroke-width="1.8" marker-end="url(#a2)"/>
    <line x1="730" y1="464" x2="730" y2="483" stroke="#b45309" stroke-width="1.8" marker-end="url(#a2)"/>
  </g>

  <!-- ⑤→A 연결 -->
  <line x1="440" y1="479" x2="558" y2="288" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#a2)"/>
  <text x="455" y="360" fill="#94a3b8" font-size="10.5" font-style="italic">코드 작업이면</text>
  <text x="455" y="374" fill="#94a3b8" font-size="10.5" font-style="italic">커밋 발생</text>

  <text x="40" y="660" fill="#475569" font-size="12">명령 흐름은 폰(콕핏 직접 선택)→큐→워커→보고. 코드 작업이면 커밋이 감사 루프를 자동 발동해, 산출물을 감사관이 견제하고 워커가 대응한다.</text>
</svg>
