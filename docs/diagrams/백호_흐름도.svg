<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="760" fill="#f7f9fc"/>
  <text x="40" y="42" fill="#0f172a" font-size="24" font-weight="800">백호 (白虎) — 작전 흐름도</text>
  <text x="40" y="66" fill="#475569" font-size="12">스킬 발동 → 편성 → 임무 → 병렬 수행 → 검증 → 해산. 지휘관 개입은 단 4회.</text>

  <!-- 단계 박스 (왼쪽 메인 컬럼) -->
  <g font-size="13">
    <rect x="60" y="96" width="600" height="50" rx="9" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="80" y="120" fill="#0f172a" font-weight="700">Phase 0 — 소대 추가 여부 결정</text>
    <text x="80" y="138" fill="#475569" font-size="11">단일 소대 / 복수 소대(멀티 패널)</text>

    <rect x="60" y="170" width="600" height="50" rx="9" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="80" y="194" fill="#0f172a" font-weight="700">Phase 1 — 팀 생성 + 기본 3분대 스폰 (A형)</text>
    <text x="80" y="212" fill="#475569" font-size="11">TeamCreate → Alpha·Bravo·Charlie 병렬 스폰</text>

    <rect x="60" y="244" width="600" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="268" fill="#0f172a" font-weight="700">Phase 1.5 — 임무 부여 + 분대 수 + DW 부대 결정</text>
    <text x="80" y="287" fill="#475569" font-size="11">A/B/C형 선택 · DW 특수부대(0/1/N) 편성 결정</text>

    <rect x="60" y="324" width="600" height="56" rx="9" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="80" y="348" fill="#0f172a" font-weight="700">Phase 1.7 — 작업 분해 + 업무·모델·권한 통합 배정</text>
    <text x="80" y="367" fill="#475569" font-size="11">소대장이 TaskCreate로 분해, 분대장별 일괄 지정</text>

    <rect x="60" y="404" width="600" height="50" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="428" fill="#0f172a" font-weight="700">Phase 5.5 — 작전 개시 승인</text>
    <text x="80" y="446" fill="#475569" font-size="11">임무 현황 보고 → 승인 후 일제 실행</text>

    <rect x="60" y="478" width="600" height="74" rx="9" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.6"/>
    <text x="80" y="502" fill="#b45309" font-weight="800">Phase 6 — 병렬 임무 수행 (대량 화력)</text>
    <text x="80" y="521" fill="#475569" font-size="11">분대(정규병 12) 병렬 · 용병(외부 AI) 선택 투입</text>
    <text x="80" y="539" fill="#991b1b" font-size="11">💥 DW 특수부대 포격: 동시 16 / 누적 최대 1,000</text>

    <rect x="60" y="576" width="600" height="56" rx="9" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
    <text x="80" y="600" fill="#15803d" font-weight="800">Phase 6.5 — 소대장 ground-truth 게이트 + 라이브 실증</text>
    <text x="80" y="619" fill="#475569" font-size="11">"보고 ≠ 사실" — grep·diff 직접 대조 + 실데이터 구동 검증</text>

    <rect x="60" y="656" width="600" height="50" rx="9" fill="#0f172a"/>
    <text x="80" y="680" fill="#fff" font-weight="700">Phase 7 — 결과 보고 + 소대 해산</text>
    <text x="80" y="698" fill="#cbd5e1" font-size="11">TeamDelete · 분대는 미리 두지 않는다(필요 시 소환)</text>

    <line x1="360" y1="146" x2="360" y2="169" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
    <line x1="360" y1="220" x2="360" y2="243" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
    <line x1="360" y1="300" x2="360" y2="323" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
    <line x1="360" y1="380" x2="360" y2="403" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
    <line x1="360" y1="454" x2="360" y2="477" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
    <line x1="360" y1="552" x2="360" y2="575" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
    <line x1="360" y1="632" x2="360" y2="655" stroke="#475569" stroke-width="1.8" marker-end="url(#a4)"/>
  </g>

  <!-- 지휘관 개입 4회 (오른쪽) -->
  <rect x="700" y="96" width="240" height="610" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="720" y="124" fill="#854d0e" font-size="14" font-weight="800">🧭 지휘관 개입 = 4회</text>
  <text x="720" y="144" fill="#92400e" font-size="11">그 외엔 소대장이 자율 진행</text>

  <g font-size="11.5">
    <rect x="720" y="158" width="200" height="44" rx="7" fill="#fff" stroke="#ca8a04"/>
    <text x="734" y="178" fill="#0f172a" font-weight="700">개입 ⓪ · Phase 0</text>
    <text x="734" y="195" fill="#475569">소대 추가 여부</text>

    <rect x="720" y="252" width="200" height="44" rx="7" fill="#fff" stroke="#ca8a04"/>
    <text x="734" y="272" fill="#0f172a" font-weight="700">개입 ① · Phase 1.5</text>
    <text x="734" y="289" fill="#475569">임무 + 분대/DW 수</text>

    <rect x="720" y="406" width="200" height="44" rx="7" fill="#fff" stroke="#ca8a04"/>
    <text x="734" y="426" fill="#0f172a" font-weight="700">개입 ② · Phase 5.5</text>
    <text x="734" y="443" fill="#475569">작전 개시 승인</text>

    <rect x="720" y="658" width="200" height="44" rx="7" fill="#fff" stroke="#ca8a04"/>
    <text x="734" y="678" fill="#0f172a" font-weight="700">개입 ③ · Phase 7</text>
    <text x="734" y="695" fill="#475569">해산 승인</text>
  </g>

  <text x="40" y="740" fill="#475569" font-size="12">⚠️ DW는 토큰 대량 소모 → 발동 전 지휘관 승인 필수. 검증 철학: 다층·적대·라이브 검증 + 임계 길목은 소대장이 직접 사실 대조.</text>
</svg>
