<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>POCKET COMMANDER · CONSOLE — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--ink:#0e1318;--ink-2:#0b1015;--panel:#161e29;--panel-2:#1b2533;--line:#283543;--line-soft:#1f2a37;--text:#cad6e2;--text-dim:#7c8a9a;--text-faint:#54637380;--brand:#ff7a1a;--s-working:#3ba7f0;--s-idle:#647588;--s-done:#2dd4a7;--s-offline:#e0556a;--mono:'IBM Plex Mono',monospace;--disp:'Chakra Petch',sans-serif;--body:'Inter',sans-serif}
*{box-sizing:border-box}html,body{margin:0;background:var(--ink);color:var(--text);font-family:var(--body)}
.bar{background:linear-gradient(180deg,var(--panel-2),var(--panel));border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:14px 22px}
.wordmark{font-family:var(--disp);font-weight:700;letter-spacing:.04em;font-size:18px;line-height:1}.wordmark .accent{color:var(--brand)}.wordmark .sub{display:block;font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.34em;color:var(--text-dim);margin-top:4px}
.nav{display:flex;gap:4px}.nav a{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--text-dim);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid transparent;cursor:pointer}.nav a.active{color:var(--text);border-color:var(--line);background:var(--ink-2)}
.bar-spacer{flex:1}.demo-flag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#f5a524;border:1px solid #f5a524;border-radius:4px;padding:3px 7px}
.console-body{padding:20px}.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.kanban{grid-template-columns:1fr 1fr}}@media(max-width:560px){.kanban{grid-template-columns:1fr}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:200px}
.col-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:4px 4px 12px;border-bottom:1px solid var(--line-soft);margin-bottom:12px}
.col-head .badge{font-family:var(--mono);font-size:11px;color:var(--ink);border-radius:999px;padding:2px 9px;font-weight:600}
.col-cards{display:flex;flex-direction:column;gap:10px}.col-empty{font-family:var(--mono);font-size:11px;color:var(--text-faint);padding:16px 4px}
.card2{background:var(--panel-2);border:1px solid var(--line);border-left-width:3px;border-radius:8px;padding:11px 12px}
.card2 .c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.card2 .c-agent{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--brand)}.card2 .c-host{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text-dim)}
.card2 .c-cmd{font-size:12px;line-height:1.4;color:var(--text)}.card2 .c-result{font-size:11px;color:var(--text-dim);margin-top:6px;max-height:48px;overflow:hidden}.card2 .c-meta{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-top:8px}
.card2 .c-actions{display:flex;gap:7px;margin-top:10px}
.btn{font-family:var(--mono);font-size:11px;letter-spacing:.04em;border-radius:6px;padding:5px 11px;cursor:pointer;border:1px solid var(--line);background:var(--ink-2);color:var(--text-dim);transition:all .15s}.btn:hover{color:var(--text)}.btn-cancel:hover{border-color:var(--s-offline);color:var(--s-offline)}.btn-retry:hover{border-color:var(--s-working);color:var(--s-working)}
</style>
</head>
<body>
<header class="bar">
  <div class="wordmark">POCKET COMMANDER · <span class="accent">CONSOLE</span><span class="sub">TASK KANBAN · 작업 관제</span></div>
  <nav class="nav"><a>관제 보드</a><a class="active">콘솔</a></nav>
  <div class="bar-spacer"></div><span class="demo-flag">DEMO MODE</span>
</header>
<div class="console-body"><div class="kanban" id="kanban"></div></div>
<script>
const COLS=[{key:'queued',label:'대기',color:'#647588'},{key:'in_progress',label:'진행 중',color:'#3ba7f0'},{key:'done',label:'완료',color:'#2dd4a7'},{key:'failed',label:'실패 · 중단',color:'#e0556a'}];
const CMDS=[['알파조','이번 주 유튜브 분석 리포트'],['정화백','회의록 3개 요약'],['찰리조','로그인 버그 디버깅'],['델타조','BuzzLab 슬라이드 렌더'],['소통꾼','수강생 공지 메일 초안'],['골프조','1분기 손익표 정리'],['인디아조','경쟁사 가격 크롤링']];
const uid=()=>Math.random().toString(36).slice(2,9);
let tasks=CMDS.map((c,i)=>({id:uid(),who:c[0],cmd:c[1],status:['queued','in_progress','done','queued'][i%4],result:null,t:Date.now()}));
function render(){
  const k=document.getElementById('kanban');k.innerHTML='';
  COLS.forEach(col=>{
    const cards=tasks.filter(t=>t.status===col.key);
    let html=`<div class="col"><div class="col-head"><span style="color:${col.color}">${col.label}</span><span class="badge" style="background:${col.color}">${cards.length}</span></div><div class="col-cards">`;
    if(!cards.length)html+=`<div class="col-empty">— 없음 —</div>`;
    cards.forEach(t=>{
      const time=new Date(t.t).toLocaleTimeString('ko-KR',{hour12:false});
      let btn='';
      if(t.status==='queued'||t.status==='in_progress')btn=`<button class="btn btn-cancel" onclick="cancel('${t.id}')">${t.status==='in_progress'?'중단':'취소'}</button>`;
      if(t.status==='done'||t.status==='failed')btn=`<button class="btn btn-retry" onclick="retry('${t.id}')">재시도</button>`;
      html+=`<div class="card2" style="border-left-color:${col.color}"><div class="c-top"><span class="c-agent">${t.who}</span><span class="c-host">#${t.id.slice(0,6)}</span></div><div class="c-cmd">${t.cmd}</div>${t.result?`<div class="c-result">${t.result}</div>`:''}<div class="c-meta">${time}</div><div class="c-actions">${btn}</div></div>`;
    });
    html+='</div></div>';k.insertAdjacentHTML('beforeend',html);
  });
}
function cancel(id){const t=tasks.find(x=>x.id===id);if(t){t.status='failed';t.result='⛔ 취소됨';t.t=Date.now()}render()}
function retry(id){const t=tasks.find(x=>x.id===id);if(t){tasks.unshift({id:uid(),who:t.who,cmd:t.cmd,status:'queued',result:null,t:Date.now()})}render()}
setInterval(()=>{
  const q=tasks.find(t=>t.status==='queued');if(q&&Math.random()<.5){q.status='in_progress';q.t=Date.now()}
  const ip=tasks.find(t=>t.status==='in_progress');if(ip&&Math.random()<.4){const ok=Math.random()<.8;ip.status=ok?'done':'failed';ip.result=ok?`"${ip.cmd}" 완료`:'⛔ 오류로 실패';ip.t=Date.now()}
  if(Math.random()<.3&&tasks.length<24){const c=CMDS[Math.random()*CMDS.length|0];tasks.unshift({id:uid(),who:c[0],cmd:c[1],status:'queued',result:null,t:Date.now()})}
  render();
},2500);
render();
</script>
</body>
</html>
